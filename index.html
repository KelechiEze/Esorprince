
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Esor-Prince - Production Assistant & Content Creator</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
      :root {
        --primary: #28e98c;
      }
      body {
        font-family: 'Inter', sans-serif;
        background-color: #000;
        color: #fff;
        overflow-x: hidden;
      }
      /* Custom scrollbar for desktop */
      @media (min-width: 1024px) {
        ::-webkit-scrollbar {
          width: 6px;
        }
        ::-webkit-scrollbar-track {
          background: #000;
        }
        ::-webkit-scrollbar-thumb {
          background: #333;
          border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb:hover {
          background: var(--primary);
        }
      }
      
      .reveal-init {
        opacity: 0;
      }

      .text-primary { color: var(--primary) !important; }
      .bg-primary { background-color: var(--primary) !important; }
      .border-primary { border-color: var(--primary) !important; }
      .hover-text-primary:hover { color: var(--primary) !important; }
      .hover-border-primary:hover { border-color: var(--primary) !important; }
      .shadow-primary { box-shadow: 0 10px 30px rgba(var(--primary-rgb), 0.3); }

      /* Animation for smooth color transitions */
      * {
        transition: color 0.3s ease, background-color 0.3s ease, border-color 0.3s ease;
      }
    </style>
  </head>
  <body class="bg-black">
    <div id="root"></div>
    <!-- Entry point for the application -->
    <script type="module" src="/index.tsx"></script>
  </body>
</html>
